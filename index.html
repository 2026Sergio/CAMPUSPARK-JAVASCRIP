
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Parking - Login</title>
    <link rel="stylesheet" href="./archivosCSS/login.css">
</head>
<body>
    <form id="formulario">
        <img src="./IMAGENES/images.png" alt="user-img">
        <input type="text" id="username" placeholder="Usuario/Correo" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <div class="box-visible">
            <input type="checkbox" id="visible">
            <span>Mostrar contraseña</span>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <br>
    <p style="color: white; font-size: 0.8rem; margin-top: 15px;">
        ¿No tienes cuenta? <a href="#" id="btn-abrir-registro" style="color: #fff; font-weight: bold;">Regístrate aquí</a>
    </p>
    <div class="contenedor-modal" id="modal-registro">
        <form id="form-registro" class="modal-content">
            <h2 style="color: white; margin-bottom: 20px;">Crear Cuenta</h2>
            <input type="text" id="reg-username" placeholder="Nombre de Usuario" required>
            <input type="text" id="reg-email" placeholder="Correo Electrónico" required>
            <input type="password" id="reg-password" placeholder="Contraseña" required>
            <div class="modal_botones">
                <button type="button" id="btn-cerrar-registro" style="background: #333; color: white;">Cancelar</button>
                <button type="submit">Registrar</button>
            </div>
        </form>
    </div>
    <script src="./moduloJAVASCRIPT/login.js"></script>
</body>
</html>
