<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Parking - Login</title>
    <link rel="stylesheet" href="./archivosCSS/login.css">
    <link rel="stylesheet" href="./archivosCSS/responsive.css">
</head>
<body>
    <main>
        <form id="formulario">
            <img src="./IMAGENES/images.png" alt="user-img">
            <input type="text" id="username" placeholder="Usuario/Correo" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <div class="box-visible">
                <input type="checkbox" id="visible">
                <span>Mostrar contraseña</span>
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>
    </main>
    <script src="./moduloJAVASCRIPT/login.js"></script>
</body>
</html>
