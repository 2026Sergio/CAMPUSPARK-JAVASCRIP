
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Parking - Login</title>
    <link rel="stylesheet" href="./archivosCSS/login.css">
    <link rel="stylesheet" href="./archivosCSS/responsive.css">
</head>
<body>
    <main>
        <form id="formulario">
        <img src="./IMAGENES/images.png" alt="user-img">
        <input type="text" id="username" placeholder="Usuario/Correo" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <div class="box-visible">
            <input type="checkbox" id="visible">
            <span>Mostrar contraseña</span>
        </div>
        <button type="submit">Iniciar Sesión</button>
         <p>
        ¿No tienes cuenta? <a href="#" id="btn-abrir-registro" >Modificar datos</a>
    </p>
    </form>
    <br>
    </p>
    <div class="contenedor-modal" id="modal-registro">
    <form id="form-registro" class="modal-content">
        <h2 style="color: white; margin-bottom: 20px;">Editar Perfil</h2>
        <input type="text" id="reg-username" placeholder="Nuevo Nombre de Usuario" required>
        <input type="text" id="reg-email" placeholder="Nuevo Correo Electrónico" required>
        <input type="password" id="reg-password" placeholder="Nueva Contraseña" required>
        
        <div class="modal_botones">
            <button type="button">Cancelar</button>
            <button type="submit">Guardar Cambios</button>
        </div>
    </form>
</div>
    </div>
    </main>
    <script src="./moduloJAVASCRIPT/login.js"></script>
</body>
</html>
