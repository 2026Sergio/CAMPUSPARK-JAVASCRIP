<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Parking</title>
    <link rel="stylesheet" href="./archivosCSS/nuevo.css">
    <link rel="stylesheet" href="./archivosCSS/formulario.css">
    <link rel="stylesheet" href="./archivosCSS/responsive.css">
</head>
<body>
    <header>
        <button id="btn-menu" class="hamburguesa">☰</button>
        <span class="logo">CAMPUS PARKING</span>
        <div id="info-clima">Cargando clima...</div>
    </header>

    <nav id="menu-lateral" class="menu-navegacion">
        <div class="user-info">
            <img src="./IMAGENES/images.png" alt="admin">
            <p id="admin-name-display">Admin</p> 
        </div>
        <a href="#" onclick="abrirPerfil()"> Mi Perfil</a>
        <hr>
        <a href="./historial.html">Historial</a>
        <a href="./registros.html">Registros</a>
        <a href="./index.html">Cerrar sesión</a>
    </nav>

    <div id="overlay" class="overlay"></div>

    <main class="contenedor-principal">
        <div class="seccion-registro">
            <form id="formulario1" class="mi-formulario">
                <h2 id="titulo-form">Gestión de Vehículos</h2>
                
                <div class="grupo">
                    <label>Nombre del Propietario</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" required>
                </div>
                <div class="grupo">
                    <label>Tipo de vehículo</label>
                    <select id="vehiculo1" required>
                        <option value="">Seleccione</option>
                        <option value="Moto">Moto (Q5)</option>
                        <option value="Carro">Carro (Q10)</option>
                        <option value="Camión">Camión (Q15)</option>
                    </select>
                </div>
                <div class="grupo">
                    <label>Placa (Formato: AAA123)</label>
                    <input type="text" id="placa1" placeholder="Ej: PGT456" pattern="[A-Z,a-z]{3}[0-9]{3}" title="3 letras y 3 números" required>
                </div>
                <div class="grupo">
                    <label>Fecha</label>
                    <input type="date" id="fecha1" required>
                </div>
                <div class="grupo">
                    <label>Hora de entrada</label>
                    <input type="time" id="hora1" required>
                </div>
                <div class="grupo">
                    <label>Espacio</label>
                    <input type="number" id="espacio1" min="1" max="10" required>
                </div>
                <button type="submit" id="btn-submit">Guardar o Actualizar</button>
                <button type="button" id="btn-cancelar" style="display:none; background:#888; color:white; margin-top:10px; border:none; padding:10px; cursor:pointer; width:100%;">Limpiar / Cancelar</button>
            </form>
        </div>

        <div class="tabla-container">
            <h2>Vehículos en el Predio</h2>
            
            <div class="grupo-busqueda" style="margin-bottom: 15px;">
                <input type="text" id="buscadorPlaca" placeholder="Buscar por placa..." 
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"
                       onkeyup="filtrarPorPlaca()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Placa</th>
                        <th>Espacio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>

        <div class="contenedor-espacios">
            <div class="espacio libre" id="espacio-1"><p>Espacio 1</p></div>
            <div class="espacio libre" id="espacio-2"><p>Espacio 2</p></div>
            <div class="espacio libre" id="espacio-3"><p>Espacio 3</p></div>
            <div class="espacio libre" id="espacio-4"><p>Espacio 4</p></div>
            <div class="espacio libre" id="espacio-5"><p>Espacio 5</p></div>
            <div class="espacio libre" id="espacio-6"><p>Espacio 6</p></div>
            <div class="espacio libre" id="espacio-7"><p>Espacio 7</p></div>
            <div class="espacio libre" id="espacio-8"><p>Espacio 8</p></div>
            <div class="espacio libre" id="espacio-9"><p>Espacio 9</p></div>
            <div class="espacio libre" id="espacio-10"><p>Espacio 10</p></div>
        </div>
    </main>

    <div class="contenedor-modal" id="modal-perfil">
        <form id="form-perfil" class="modal-content-perfil">
            <h2>Mi Perfil</h2>
            <div class="grupo">
                <label>Nombre</label>
                <input type="text" id="edit-nombre" required>
            </div>
            <div class="grupo">
                <label>Correo</label>
                <input type="email" id="edit-email" required>
            </div>
            <div class="grupo">
                <label>Contraseña</label>
                <input type="password" id="edit-pass" required>
            </div>
            <div class="modal_botones">
                <button type="button" id="btn-cerrar-perfil" class="btn-cancelar-modal">Cancelar</button>
                <button type="submit" class="btn-guardar">Guardar Cambios</button>
            </div>
        </form>
    </div>

    <script src="./moduloJAVASCRIPT/componentes-tipo.js"></script>
    <script src="./moduloJAVASCRIPT/nuevo.js"></script>
</body>
</html>
