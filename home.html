<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Parking</title>
    <link rel="stylesheet" href="./archivosCSS/nuevo.css">
    <link rel="stylesheet" href="./archivosCSS/formulario.css">
</head>
<body>
    <header>
        <button id="btn-menu" class="hamburguesa">☰</button>
        <span class="logo">CAMPUS PARKING</span>
    </header>
    <nav id="menu-lateral" class="menu-navegacion">

        <div class="user-info">
            <img src="./IMAGENES/images.png" alt="admin">
            <p>Admin</p>
        </div>
        <a href="#">Panel</a>
        <a href="#">Vehículos</a>
        <a href="#">Pagos</a>
        <a href="./index.html">Cerrar sesión</a>
    </nav>
    <div id="overlay" class="overlay"></div>
    <main class="contenedor-principal">
        <div class="seccion-registro">
            <form id="formulario1" class="mi-formulario">
                <h2>Ingreso de Vehículos</h2>
                <div class="grupo">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese nombre..." required>
                </div>
                <div class="grupo">
                    <label>Tipo de vehículo</label>
                    <select id="vehiculo1" required>
                        <option value="">Seleccione</option>
                        <option value="Moto">Moto</option>
                        <option value="Carro">Carro</option>
                    </select>
                </div>
                <div class="grupo">
                    <label>Placa</label>
                    <input type="text" id="placa1" placeholder="Ingrese placa..." required>
                </div>
                <div class="grupo">
                    <label>Fecha</label>
                    <input type="date" id="fecha1" required>
                </div>
                <div class="grupo">
                    <label>Hora de entrada</label>
                    <input type="time" id="hora1" required>
                </div>
                <div class="grupo">
                    <label>Espacio asignado</label>
                    <input type="number" id="espacio1" min="1" max="10" required>
                </div>
                <button type="submit">
                    Guardar Vehículo
                </button>
            </form>
        </div>
    <script src="./moduloJAVASCRIPT/nuevo.js"></script>

</body>
</html>
